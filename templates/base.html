<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Resume Analyzer Pro{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fa-solid fa-robot"></i> AI Resume Analyzer
        </div>
        <div class="nav-links">
            <a href="/dashboard"><i class="fa-solid fa-upload"></i> Upload & Preview</a>
            <a href="/extract_page"><i class="fa-solid fa-file-lines"></i> Extract Text</a>
            <a href="/analyze_page"><i class="fa-solid fa-wand-magic-sparkles"></i> Analyze Skills</a>
        </div>
        <div class="nav-actions">
            <a href="/logout" class="btn btn-outline" style="padding: 0.5rem 1rem;"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
        </div>
    </nav>

    <div class="app-container wide" style="margin-top: 2rem;">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
